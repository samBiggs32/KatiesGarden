version: 2
updates:
  # NuGet — Blazor client
  - package-ecosystem: nuget
    directory: "/Web/KatiesGarden.Web/Client"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      aspnetcore:
        patterns: ["Microsoft.AspNetCore.*"]
      mudblazor:
        patterns: ["MudBlazor"]

  # NuGet — Azure Functions API
  - package-ecosystem: nuget
    directory: "/Api"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      azure-functions:
        patterns: ["Microsoft.Azure.Functions.*"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
