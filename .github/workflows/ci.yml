name: CI

on:
  push:
    branches-ignore:
      - main  # production-deploy.yml handles main

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    name: Build & Unit Tests
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build client
        run: dotnet build Web/KatiesGarden.Web/Client/KatiesGarden.Web.Client.csproj --configuration Release

      - name: Build API
        run: dotnet build Api/KatiesGarden.Api.csproj --configuration Release

      - name: Build Aspire AppHost
        run: dotnet build AppHost/KatiesGarden.AppHost.csproj --configuration Release

      - name: Run unit tests
        run: dotnet test Tests/KatiesGarden.Tests/KatiesGarden.Tests.csproj --configuration Release --filter "Category!=Integration" --logger "trx;LogFileName=unit-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results-${{ github.sha }}
          path: "**/unit-results.trx"

  integration_tests:
    runs-on: ubuntu-latest
    name: Integration Tests (Postgres + Aspire smoke)
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Verify Docker
        run: docker info

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Run integration tests
        run: dotnet test Tests/KatiesGarden.Tests/KatiesGarden.Tests.csproj --configuration Release --filter "Category=Integration" --logger "trx;LogFileName=integration-results.trx"

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results-${{ github.sha }}
          path: "**/integration-results.trx"
