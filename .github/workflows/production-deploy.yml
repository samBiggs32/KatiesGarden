name: Production Deployment

on:
  push:
    branches:
      - main

jobs:
  verify_secrets:
    name: Verify Secrets
    uses: ./.github/workflows/verify-secrets.yml
    secrets: inherit

  unit_tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Run unit tests
        run: dotnet test Tests/KatiesGarden.Tests/KatiesGarden.Tests.csproj --configuration Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-results
          path: "**/*.trx"

  build_and_deploy_production:
    needs: [unit_tests, verify_secrets]
    runs-on: ubuntu-latest
    name: Deploy to Production
    outputs:
      site_url: ${{ steps.deploy.outputs.static_web_app_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          lfs: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build and publish client
        run: dotnet publish Web/KatiesGarden.Web/Client/KatiesGarden.Web.Client.csproj --configuration Release --output publish_output

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "publish_output/wwwroot"
          api_location: "Api"
          output_location: ""

  smoke_test_production:
    needs: build_and_deploy_production
    runs-on: ubuntu-latest
    name: Smoke Test Production
    env:
      BASE_URL: ${{ needs.build_and_deploy_production.outputs.site_url }}
    steps:
      - name: Wait for deployment to propagate
        run: sleep 20

      - name: Homepage loads
        run: |
          for i in 1 2 3 4 5; do
            BODY=$(curl -sf "$BASE_URL" 2>/dev/null) && break
            echo "Attempt $i: not ready, retrying in 15s..."
            sleep 15
          done
          echo "$BODY" | grep -qi "katie" || (echo "ERROR: homepage body does not mention Katie's Garden" && exit 1)
          echo "PASS: homepage loaded"

      - name: Blazor WASM runtime is published
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/_framework/blazor.webassembly.js")
          [ "$STATUS" = "200" ] || (echo "ERROR: blazor.webassembly.js returned $STATUS" && exit 1)
          echo "PASS: Blazor runtime reachable"

      - name: API health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/api/health")
          [ "$STATUS" = "200" ] || (echo "ERROR: /api/health returned $STATUS" && exit 1)
          echo "PASS: API healthy"

      - name: API diagnostics check
        run: |
          BODY=$(curl -sf "$BASE_URL/api/diagnostics")
          echo "$BODY" | jq .
          STATUS=$(echo "$BODY" | jq -r '.status')
          [ "$STATUS" = "ready" ] || (echo "ERROR: /api/diagnostics reports $STATUS" && exit 1)
          echo "PASS: All dependencies ready"

      - name: SPA fallback — /gallery
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/gallery")
          [ "$STATUS" = "200" ] || (echo "ERROR: /gallery returned $STATUS" && exit 1)
          echo "PASS: /gallery"

      - name: SPA fallback — /contact
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/contact")
          [ "$STATUS" = "200" ] || (echo "ERROR: /contact returned $STATUS" && exit 1)
          echo "PASS: /contact"
