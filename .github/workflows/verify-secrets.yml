name: Verify Secrets

# Runs:
#   - Daily at 06:00 UTC (drift detection — catches a rotated/expired
#     token before it bites the next deploy)
#   - On manual trigger (workflow_dispatch) for re-verification after
#     rotating any credential
#   - When called from another workflow (workflow_call) — the deploy
#     pipelines require this gate to pass before they will run

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    name: Verify external credentials
    steps:
      - name: Cloudflare API token
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set"
            exit 1
          fi
          response=$(curl -sS -H "Authorization: Bearer $TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify)
          status=$(echo "$response" | jq -r '.result.status // "missing"')
          success=$(echo "$response" | jq -r '.success // false')
          if [ "$success" != "true" ] || [ "$status" != "active" ]; then
            echo "::error::Cloudflare token is not active (success=$success, status=$status)"
            echo "$response" | jq '.'
            exit 1
          fi
          echo "PASS: Cloudflare API token is active"

      - name: Brevo REST API key
        env:
          KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::BREVO_API_KEY secret is not set"
            exit 1
          fi
          status=$(curl -sS -o /tmp/brevo.json -w "%{http_code}" \
            -H "api-key: $KEY" -H "accept: application/json" \
            https://api.brevo.com/v3/account)
          if [ "$status" != "200" ]; then
            echo "::error::Brevo REST API returned HTTP $status"
            cat /tmp/brevo.json
            exit 1
          fi
          email=$(jq -r '.email // "unknown"' /tmp/brevo.json)
          echo "PASS: Brevo REST API authenticated as $email"

      - name: Brevo SMTP credentials
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          for var in SMTP_HOST SMTP_USERNAME SMTP_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::$var secret is not set"
              exit 1
            fi
          done
          python3 - <<'PY'
          import os, smtplib, sys
          host = os.environ["SMTP_HOST"]
          port = int(os.environ.get("SMTP_PORT") or "587")
          user = os.environ["SMTP_USERNAME"]
          pwd  = os.environ["SMTP_PASSWORD"]
          try:
              s = smtplib.SMTP(host, port, timeout=15)
              s.ehlo()
              s.starttls()
              s.ehlo()
              s.login(user, pwd)
              s.quit()
              print(f"PASS: SMTP {host}:{port} authenticated as {user}")
          except Exception as e:
              print(f"::error::SMTP authentication failed: {e}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Neon database connectivity
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL secret is not set — subscribe endpoint will degrade (Brevo-only, no local store)"
            exit 0
          fi
          sudo apt-get update -qq >/dev/null
          sudo apt-get install -y -qq postgresql-client >/dev/null
          if ! psql "$DATABASE_URL" -tAc "SELECT 1" 2>/tmp/pg_err | grep -q "^1$"; then
            echo "::error::Cannot connect to Neon database"
            cat /tmp/pg_err
            exit 1
          fi
          echo "PASS: Neon database is reachable"

      - name: Azure Static Web Apps deployment token
        env:
          TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::AZURE_STATIC_WEB_APPS_API_TOKEN is not set"
            exit 1
          fi
          # The SWA deployment token is opaque — the only definitive test is
          # a real deploy. We do a shape/length sanity check here so a clearly
          # truncated or empty value fails fast.
          if [ "${#TOKEN}" -lt 40 ]; then
            echo "::error::AZURE_STATIC_WEB_APPS_API_TOKEN looks malformed (length=${#TOKEN})"
            exit 1
          fi
          echo "PASS: Azure SWA deployment token is present (full validation at deploy time)"
