<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <!-- user-scalable=no is a WCAG 2.1 Level AA violation — it prevents pinch-zoom
         for users with low vision. shrink-to-fit=no is fine (suppresses iOS Safari
         shrinking behaviour). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />

    <!-- Primary SEO -->
    <title>Katie's Garden — Garden Services in Milverton, Somerset</title>
    <meta name="description" content="Professional garden services, bespoke woodwork, and planting schemes in Milverton, Somerset. Free initial consultation. Serving Taunton and surrounding areas." />
    <meta name="keywords" content="Gardening, Milverton, Garden Services, Woodwork, Gardener, horticulturalist, Garden Design, Flowers, Somerset, Planting, Grass Cutting, Weeding, Weed Control, Grounds Clearance, Planting Schemes, Flower Sales" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Sam Biggs" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Slack previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.katiesgarden.uk/" />
    <meta property="og:site_name" content="Katie's Garden" />
    <meta property="og:title" content="Katie's Garden — Garden Services in Milverton, Somerset" />
    <meta property="og:description" content="Professional garden services, bespoke woodwork, and planting schemes in Milverton, Somerset. Free initial consultation." />
    <meta property="og:image" content="https://www.katiesgarden.uk/Images/Backgrounds/Carousel/yellow_flowers.jpg" />
    <meta property="og:image:width" content="1400" />
    <meta property="og:image:height" content="933" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Katie's Garden — Garden Services in Milverton, Somerset" />
    <meta name="twitter:description" content="Professional garden services, bespoke woodwork, and planting schemes in Milverton, Somerset. Free initial consultation." />
    <meta name="twitter:image" content="https://www.katiesgarden.uk/Images/Backgrounds/Carousel/yellow_flowers.jpg" />

    <base href="/" />

    <!-- Preconnect to CDN origins so TCP/TLS handshakes happen before the
         parser reaches the stylesheet/script tags below. -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css" integrity="sha384-zCbKRCUGaJDkqS1kPbPd7TveP5iyJE0EjAuZQTgFLD2ylzuqKfdKlfG/eSrtxUkn" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha384-OLBgp1GsljhM2TJ+sbHjaiH9txEUvgdDTAzHv2P24donTt6/529l+9Ua0vFImLlb" crossorigin="anonymous">
    <link href="css/app.css" rel="stylesheet" />
    <link href="KatiesGarden.Web.Client.styles.css" rel="stylesheet" />
    <link href="manifest.json" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="KatiesGardenLogo.png" />
    <link rel="shortcut icon" type="image/ico" href="KatiesGardenLogo.png" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-fQybjgWLrvvRgtW6bFlB7jaZrFsaBXjsOMm/tB9LTS58ONXgqbR9W8oWht/amnpF" crossorigin="anonymous"></script>

    <script src="scripts/GlobalFunctions.js"></script>
    <script src="scripts/Carousel.js"></script>
</head>

<body class="background-colour-primary">
    <div id="app">
        <!-- Shown while the Blazor WASM runtime downloads (~2-4s on first visit). -->
        <div class="app-loading">
            <img src="KatiesGardenLogo.png" alt="Katie's Garden" class="app-loading__logo" />
            <p class="app-loading__title">Katie's Garden</p>
            <p class="app-loading__subtitle">
                <i class="fas fa-spinner fa-spin" aria-hidden="true"></i>
                Loading&hellip;
            </p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <script src="sw-registrator.js"></script>

    <script src="scripts/shop.js"></script>

      "telephone": "+447804784522",

        "@type": "PostalAddress",
        "addressLocality": "Milverton",

      "areaServed": [
        { "@type": "City", "name": "Taunton" },
        { "@type": "City", "name": "Milverton" },
        { "@type": "AdministrativeArea", "name": "Somerset" }
      ],
      "url": "https://www.katiesgarden.uk",

        "@type": "OpeningHoursSpecification",

</body>

</html>
